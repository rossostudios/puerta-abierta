name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/admin/**"
      - "packages/shared-api/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/admin/**"
      - "packages/shared-api/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Check E2E credentials availability
        id: e2e_creds
        run: |
          if [ -z "${{ secrets.E2E_USER_EMAIL }}" ] || [ -z "${{ secrets.E2E_USER_PASSWORD }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Playwright E2E run because E2E_USER_EMAIL/E2E_USER_PASSWORD secrets are not configured."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.e2e_creds.outputs.available == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        if: steps.e2e_creds.outputs.available == 'true'
        run: npm ci
        working-directory: apps/admin

      - name: Install Playwright browsers
        if: steps.e2e_creds.outputs.available == 'true'
        run: npx playwright install --with-deps chromium
        working-directory: apps/admin

      - name: Run E2E tests
        if: steps.e2e_creds.outputs.available == 'true'
        run: npm run test:e2e
        working-directory: apps/admin
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && steps.e2e_creds.outputs.available == 'true' }}
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 14
