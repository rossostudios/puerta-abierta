name: Backend Quality Gate

on:
  pull_request:
    paths:
      - "apps/backend-rs/**"
      - "scripts/quality-gate.sh"
      - ".github/workflows/backend-quality.yml"
  push:
    branches: [main]
    paths:
      - "apps/backend-rs/**"
      - "scripts/quality-gate.sh"
      - ".github/workflows/backend-quality.yml"

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/backend-rs
          cache-targets: true

      - name: Ensure rustfmt/clippy on pinned backend toolchain
        working-directory: apps/backend-rs
        run: rustup component add rustfmt clippy

      - name: Run backend quality checks
        run: ./scripts/quality-gate.sh backend
