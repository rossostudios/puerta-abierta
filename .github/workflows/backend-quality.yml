name: Backend Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Ensure rustfmt/clippy on pinned backend toolchain
        working-directory: apps/backend-rs
        run: rustup component add rustfmt clippy

      - name: Run backend quality checks
        run: ./scripts/quality-gate.sh backend
