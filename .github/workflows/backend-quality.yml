name: Backend Quality Gate

on:
  pull_request:
    paths:
      - "apps/backend-rs/**"
      - "scripts/quality-gate.sh"
      - ".github/workflows/backend-quality.yml"
  push:
    branches: [main]
    paths:
      - "apps/backend-rs/**"
      - "scripts/quality-gate.sh"
      - ".github/workflows/backend-quality.yml"

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - name: Enable sccache for Rust
        if: steps.sccache.outcome == 'success'
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache --start-server 2>/dev/null && sccache --show-stats >/dev/null 2>&1; then
            echo "sccache server started successfully"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start, building without cache"
            sccache --stop-server 2>/dev/null || true
          fi

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/backend-rs
          cache-targets: true

      - name: Ensure rustfmt/clippy on pinned backend toolchain
        working-directory: apps/backend-rs
        run: rustup component add rustfmt clippy

      - name: Run backend quality checks
        run: ./scripts/quality-gate.sh backend
