name: AWS ECS Deploy

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy"
        required: true
        type: choice
        options:
          - backend
          - admin
          - web
      deploy_service:
        description: "Deploy ECS service after pushing image"
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve deploy config
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.app }}" == "backend" ]]; then
            DOCKER_CONTEXT="apps/backend-rs"
            DOCKERFILE_PATH="apps/backend-rs/Dockerfile"
            CONTAINER_NAME="casaora-backend"
            ECR_REPOSITORY="${{ vars.ECR_REPOSITORY_BACKEND }}"
            ECS_SERVICE="${{ vars.ECS_SERVICE_BACKEND }}"
            TASKDEF_PATH="infra/aws/ecs/taskdef.backend.json"
            {
              echo "DOCKER_BUILD_ARGS<<EOF"
              echo "EOF"
            } >> "$GITHUB_ENV"
          elif [[ "${{ inputs.app }}" == "admin" ]]; then
            DOCKER_CONTEXT="."
            DOCKERFILE_PATH="apps/admin/Dockerfile"
            CONTAINER_NAME="casaora-admin"
            ECR_REPOSITORY="${{ vars.ECR_REPOSITORY_ADMIN }}"
            ECS_SERVICE="${{ vars.ECS_SERVICE_ADMIN }}"
            TASKDEF_PATH="infra/aws/ecs/taskdef.admin.json"
            {
              echo "DOCKER_BUILD_ARGS<<EOF"
              echo "NEXT_PUBLIC_API_BASE_URL=${{ vars.ADMIN_NEXT_PUBLIC_API_BASE_URL }}"
              echo "NEXT_PUBLIC_SITE_URL=${{ vars.ADMIN_NEXT_PUBLIC_SITE_URL }}"
              echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ vars.ADMIN_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
              echo "NEXT_PUBLIC_CLERK_DOMAIN=${{ vars.ADMIN_NEXT_PUBLIC_CLERK_DOMAIN }}"
              echo "NEXT_PUBLIC_CLERK_JS_URL=${{ vars.ADMIN_NEXT_PUBLIC_CLERK_JS_URL }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            DOCKER_CONTEXT="."
            DOCKERFILE_PATH="apps/web/Dockerfile"
            CONTAINER_NAME="casaora-web"
            ECR_REPOSITORY="${{ vars.ECR_REPOSITORY_WEB }}"
            ECS_SERVICE="${{ vars.ECS_SERVICE_WEB }}"
            TASKDEF_PATH="infra/aws/ecs/taskdef.web.json"
            {
              echo "DOCKER_BUILD_ARGS<<EOF"
              echo "NEXT_PUBLIC_API_BASE_URL=${{ vars.WEB_NEXT_PUBLIC_API_BASE_URL }}"
              echo "NEXT_PUBLIC_SITE_URL=${{ vars.WEB_NEXT_PUBLIC_SITE_URL }}"
              echo "NEXT_PUBLIC_ADMIN_URL=${{ vars.WEB_NEXT_PUBLIC_ADMIN_URL }}"
              echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ vars.WEB_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
              echo "NEXT_PUBLIC_CLERK_DOMAIN=${{ vars.WEB_NEXT_PUBLIC_CLERK_DOMAIN }}"
              echo "NEXT_PUBLIC_CLERK_JS_URL=${{ vars.WEB_NEXT_PUBLIC_CLERK_JS_URL }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi
          echo "DOCKER_CONTEXT=${DOCKER_CONTEXT}" >> "$GITHUB_ENV"
          echo "DOCKERFILE_PATH=${DOCKERFILE_PATH}" >> "$GITHUB_ENV"
          echo "CONTAINER_NAME=${CONTAINER_NAME}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE=${ECS_SERVICE}" >> "$GITHUB_ENV"
          echo "TASKDEF_PATH=${TASKDEF_PATH}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKER_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          build-args: ${{ env.DOCKER_BUILD_ARGS }}
          push: true
          tags: ${{ env.IMAGE_URI }}

      - name: Render ECS task definition
        if: ${{ inputs.deploy_service }}
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASKDEF_PATH }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}

      - name: Deploy ECS service
        if: ${{ inputs.deploy_service }}
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
