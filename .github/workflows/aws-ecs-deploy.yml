name: AWS ECS Deploy

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy"
        required: true
        type: choice
        options:
          - backend
          - admin
          - web
          - all
      deploy_service:
        description: "Deploy ECS service after pushing image"
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: aws-ecs-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    environment: Production
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      DOCKER_BUILDX: "true"
      DOCKER_PLATFORM: "linux/arm64"

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up QEMU (ARM64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy selected app(s)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.deploy_service }}" != "true" ]]; then
            echo "deploy_service=false is not supported by the unified script-driven production workflow." >&2
            echo "Use a local break-glass script path if you need image-only builds." >&2
            exit 1
          fi

          run_deploy() {
            local app="$1"
            local script_path=""
            case "${app}" in
              backend) script_path="./scripts/aws/deploy-backend-production.sh" ;;
              admin) script_path="./scripts/aws/deploy-admin-production.sh" ;;
              web) script_path="./scripts/aws/deploy-web-production.sh" ;;
              *)
                echo "Unsupported app: ${app}" >&2
                exit 1
                ;;
            esac

            echo "## Deploying ${app}" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            "${script_path}"
            echo "- Result: completed" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
          }

          if [[ "${{ inputs.app }}" == "all" ]]; then
            for app in backend admin web; do
              run_deploy "${app}"
            done
          else
            run_deploy "${{ inputs.app }}"
          fi
