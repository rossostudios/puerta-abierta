name: AWS ECS Deploy

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy"
        required: true
        type: choice
        options:
          - backend
          - admin
          - web
          - all
      deploy_service:
        description: "Deploy ECS service after pushing image"
        required: true
        type: boolean
        default: true
      wait_for_service_stability:
        description: "Wait for ECS service stability after deployment"
        required: true
        type: boolean
        default: true
      run_smoke_tests:
        description: "Run smoke tests after deployment"
        required: true
        type: boolean
        default: true
      enable_registry_cache:
        description: "Enable registry-backed buildx cache (may require extra ECR permissions)"
        required: true
        type: boolean
        default: true
      backend_image_tag:
        description: "Optional existing backend image tag to reuse (skips backend image build)"
        required: false
        type: string
      runner_label:
        description: "GitHub runner label for deploy jobs"
        required: true
        type: choice
        options:
          - ubuntu-24.04-arm
          - ubuntu-latest
        default: ubuntu-24.04-arm

permissions:
  id-token: write
  contents: read

concurrency:
  group: aws-ecs-production-deploy
  cancel-in-progress: false

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.resolve.outputs.apps }}
    steps:
      - name: Resolve app matrix
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          selected="${{ inputs.app }}"
          case "${selected}" in
            all)
              apps='["backend","admin","web"]'
              ;;
            backend|admin|web)
              apps="[\"${selected}\"]"
              ;;
            *)
              echo "Unsupported app selection: ${selected}" >&2
              exit 1
              ;;
          esac
          echo "apps=${apps}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: resolve-targets
    environment: Production
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        app: ${{ fromJson(needs.resolve-targets.outputs.apps) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      BACKEND_IMAGE_TAG: ${{ inputs.backend_image_tag }}
      DOCKER_BUILDX: "true"
      DOCKER_PLATFORM: "linux/arm64"
      DOCKER_CONFIG_ISOLATED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up QEMU (ARM64 builds)
        if: ${{ !contains(inputs.runner_label, 'arm') }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Stagger deploy start
        shell: bash
        env:
          APP: ${{ matrix.app }}
        run: |
          case "${APP}" in
            admin) sleep 30 ;;
            web)   sleep 60 ;;
          esac

      - name: Deploy selected app
        shell: bash
        run: |
          set -euo pipefail
          deploy_service="${{ inputs.deploy_service }}"
          wait_for_stability="${{ inputs.wait_for_service_stability }}"
          run_smoke_tests="${{ inputs.run_smoke_tests }}"
          registry_cache="${{ inputs.enable_registry_cache }}"
          app="${{ matrix.app }}"
          case "${app}" in
            backend) script_path="./scripts/aws/deploy-backend-production.sh" ;;
            admin) script_path="./scripts/aws/deploy-admin-production.sh" ;;
            web) script_path="./scripts/aws/deploy-web-production.sh" ;;
            *)
              echo "Unsupported app: ${app}" >&2
              exit 1
              ;;
          esac

          echo "## Deploying ${app}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          if [[ "${deploy_service}" == "true" ]]; then
            echo "- Mode: build + deploy" >> "${GITHUB_STEP_SUMMARY}"
            echo "- Wait for stability: ${wait_for_stability}" >> "${GITHUB_STEP_SUMMARY}"
            echo "- Run smoke tests: ${run_smoke_tests}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "- Mode: image-only build/push (no ECS service update)" >> "${GITHUB_STEP_SUMMARY}"
          fi
          echo "- Registry cache enabled: ${registry_cache}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          run_args=(
            "DEPLOY_SERVICE=${deploy_service}"
            "WAIT_FOR_SERVICE_STABILITY=${wait_for_stability}"
            "RUN_SMOKE_TESTS=${run_smoke_tests}"
            "DOCKER_REGISTRY_CACHE=${registry_cache}"
          )

          if [[ "${app}" == "backend" && -n "${BACKEND_IMAGE_TAG}" ]]; then
            run_args+=("SKIP_IMAGE_BUILD=true" "IMAGE_TAG=${BACKEND_IMAGE_TAG}")
          else
            run_args+=("SKIP_IMAGE_BUILD=false")
          fi

          env "${run_args[@]}" "${script_path}"
          echo "- Result: completed" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
