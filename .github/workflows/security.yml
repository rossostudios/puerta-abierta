name: Security Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm Audit (Advisory)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [apps/admin, apps/web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci --prefix ${{ matrix.app }}
      - id: npm_audit
        continue-on-error: true
        run: npm audit --prefix ${{ matrix.app }} --audit-level=high
      - name: Record audit status
        if: steps.npm_audit.outcome == 'failure'
        run: |
          echo "::warning::npm audit reported high-severity advisories in ${{ matrix.app }}. Review and schedule remediation."

  cargo-audit:
    name: Cargo Audit (Advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: cargo_audit
        continue-on-error: true
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Tracked in issue #9. No upstream patch exists yet for rsa.
          ignore: RUSTSEC-2023-0071
          working-directory: apps/backend-rs
      - name: Record cargo audit status
        if: steps.cargo_audit.outcome == 'failure'
        run: |
          echo "::warning::Cargo audit reported advisories/warnings. Review output and update ignores only with explicit risk acceptance."
